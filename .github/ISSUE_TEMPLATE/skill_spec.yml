name: Skill Spec
description: 设计或补齐一个 ProjectPilot Skill
title: "[Skill] "
labels: ["skill"]
body:
  - type: input
    id: skill_name
    attributes:
      label: Skill 名称
      placeholder: workflow-meeting-action-items
    validations:
      required: true
  - type: textarea
    id: purpose
    attributes:
      label: 适用场景
      description: 用户什么时候应该调用它？
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 调用步骤
      description: 按顺序写清楚查询、生成、写入和回传。
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: 输入输出样例
      description: 粘贴最小 JSON 输入和预期输出。
  - type: textarea
    id: failure
    attributes:
      label: 失败处理
      description: 权限、人员、文档、重复写入、超时分别怎么处理？
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
    validations:
      required: true
