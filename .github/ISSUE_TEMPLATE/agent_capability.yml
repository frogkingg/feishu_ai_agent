name: Agent Capability
description: 教会 ProjectPilot 一个新的同事式流程或可执行能力
title: "[Agent Capability] "
labels: ["capability", "agent"]
body:
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 希望 ProjectPilot 学会什么流程或能力？
      placeholder: 例如：根据群聊指令创建飞书任务，并在信息不完整时追问负责人和截止时间。
    validations:
      required: true
  - type: textarea
    id: trigger
    attributes:
      label: 触发方式
      description: 用户可能会在群里怎么说？哪些话不应该触发？
    validations:
      required: true
  - type: textarea
    id: workflow
    attributes:
      label: 同事式处理流程
      description: 写清楚理解、追问、确认、执行、回群的顺序。
    validations:
      required: true
  - type: textarea
    id: tools
    attributes:
      label: 需要调用的工具
      description: 飞书 IM / Calendar / Task / Docs / Wiki / Base / LLM / 本地脚本等。
    validations:
      required: true
  - type: textarea
    id: permissions
    attributes:
      label: 权限和身份
      description: 需要 bot 还是 user 身份？需要哪些 scope？
  - type: textarea
    id: confirmation
    attributes:
      label: 确认策略
      description: 哪些情况可以直接执行，哪些情况必须先让用户确认？
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      description: 给出群聊测试口令和预期结果。
    validations:
      required: true
