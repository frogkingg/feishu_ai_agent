name: Demo Task
description: 拆分比赛 Demo 的具体任务
title: "[Demo] "
labels: ["demo"]
body:
  - type: textarea
    id: user_story
    attributes:
      label: Demo 用户故事
      description: 这个任务在演示中让观众看到什么？
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 范围
      description: 包含什么，不包含什么？
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: 依赖
      description: 依赖哪些飞书能力、数据、文档或人员？
  - type: textarea
    id: done
    attributes:
      label: 完成标准
    validations:
      required: true
